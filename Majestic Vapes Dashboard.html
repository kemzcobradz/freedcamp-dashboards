table { width:100%; border-collapse:collapse; font-size:0.8rem; }

tbody tr:hover { background:#1e293b; }
tbody tr.parent-row { background:#2a1520; }

.status-completed { background:#166534; color:#86efac; }

tartDate": "2026-03-01", "dueDate": "2026-03-13", "completedDate": "", "month": "3 - Mar", "estMinutes": 5.0, "credits": 0.0}];
const BUDGET = 30;
const TODAY = new Date().toISOString().slice(0,10);
let workloadMode = 'minutes';
let workloadChart, statusChart;

const STATUS_MAP = {
  'Done':'Completed','Completed':'Completed',
  'Doing':'In Progress','In Progress':'In Progress','Ready to Start':'In Progress',
  'Waiting - Client':'In Progress','Waiting - Internal':'In Progress',
  "Don't Start":'No Progress','No Progress':'No Progress','Not Started':'No Progress','':'No Progress'
};

function isBacklog(t) { return t.taskList && t.taskList.toLowerCase().includes('backlog'); }
function isPlanned(t) { return t.taskList && t.taskList.toLowerCase().includes('planned'); }

function getFilteredTasks() {
  const showBacklog = document.getElementById('toggleBacklog').checked;
  const showPlanned = document.getElementById('togglePlanned').checked;
  return ALL_TASKS.filter(t => {
    if (!showBacklog && isBacklog(t)) return false;
    if (!showPlanned && isPlanned(t)) return false;
    return true;
  });
}

function getDisplayTasks(filtered) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const assignee = document.getElementById('assigneeFilter').value;
  const priority = document.getElementById('priorityFilter').value;
  return filtered.filter(t => {
    if (search && !t.title.toLowerCase().includes(search) && !t.assignee.toLowerCase().includes(search)) return false;
    if (status && t.statusCategory !== status) return false;
    if (assignee && t.assignee !== assignee) return false;
    if (priority && t.priority !== priority) return false;
    return true;
  });
}

function computeOverdue() {
  // Overdue: tasks from Backlog + Current (NOT Planned) with dueDate < today and not Completed
  return ALL_TASKS.filter(t => {
    if (isPlanned(t)) return false;
    if (t.statusCategory === 'Completed') return false;
    if (!t.dueDate) return false;
    return t.dueDate < TODAY;
  }).length;
}

function computeKPIs(tasks) {
  const total = tasks.length;
  const completed = tasks.filter(t => t.statusCategory === 'Completed').length;
  const pct = total > 0 ? Math.round((completed/total)*100) : 0;
  const totalCredits = tasks.reduce((s,t) => s + t.credits, 0);
  const overage = totalCredits - BUDGET;
  const estHours = (tasks.reduce((s,t) => s + t.estMinutes, 0) / 60).toFixed(1);
  const overdue = computeOverdue();
  return { total, overdue, overage, pct, totalCredits, estHours };
}

function renderKPIs(kpis) {
  const ov = kpis.overage;
  const ovStr = ov >= 0 ? '+' + ov.toFixed(1) : ov.toFixed(1);
  const ovClass = ov > 0 ? 'red' : 'green';
  const odClass = kpis.overdue > 0 ? 'red' : 'green';
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="kpi-value">${kpis.total}</div><div class="kpi-label">Total Tasks</div></div>
    <div class="kpi"><div class="kpi-value ${odClass}">${kpis.overdue}</div><div class="kpi-label">Overdue</div></div>
    <div class="kpi"><div class="kpi-value ${ovClass}">${ovStr}</div><div class="kpi-label">Overage</div></div>
    <div class="kpi"><div class="kpi-value">${kpis.pct}%</div><div class="kpi-label">Completion</div></div>
    <div class="kpi"><div class="kpi-value">${kpis.totalCredits.toFixed(1)}</div><div class="kpi-label">Total Credits</div></div>
    <div class="kpi"><div class="kpi-value">${kpis.estHours}</div><div class="kpi-label">Est. Hours</div></div>
  `;
}

function renderWorkloadChart(tasks) {
  const assignees = {};
  tasks.forEach(t => {
    if (!t.assignee) return;
    if (!assignees[t.assignee]) assignees[t.assignee] = { minutes:0, credits:0 };
    assignees[t.assignee].minutes += t.estMinutes;
    assignees[t.assignee].credits += t.credits;
  });
  const labels = Object.keys(assignees).sort();
  const values = labels.map(a => workloadMode === 'minutes' ? assignees[a].minutes : assignees[a].credits);
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#f97316','#84cc16','#e11d48','#6366f1'];
  if (workloadChart) workloadChart.destroy();
  workloadChart = new Chart(document.getElementById('workloadChart'), {
    type:'bar',
    data:{ labels, datasets:[{ data:values, backgroundColor:labels.map((_,i)=>colors[i%colors.length]), borderRadius:4 }] },
    options:{ indexAxis:'y', responsive:true, plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#94a3b8' }, grid:{ color:'#1e293b' } }, y:{ ticks:{ color:'#e2e8f0' }, grid:{ display:false } } } }
  });
}

function renderStatusChart(tasks) {
  const counts = { Completed:0, 'In Progress':0, 'No Progress':0 };
  tasks.forEach(t => { counts[t.statusCategory] = (counts[t.statusCategory]||0)+1; });
  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('statusChart'), {
    type:'doughnut',
    data:{ labels:Object.keys(counts), datasets:[{ data:Object.values(counts), backgroundColor:['#22c55e','#3b82f6','#64748b'] }] },
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#e2e8f0' } } } }
  });
}

function renderTable(tasks) {
  const tbody = document.getElementById('taskBody');
  tbody.innerHTML = tasks.map(t => {
    const sc = t.statusCategory === 'Completed' ? 'status-completed' : t.statusCategory === 'In Progress' ? 'status-inprogress' : 'status-noprogress';
    const rowClass = t.type === 'Task' ? ' class="parent-row"' : '';
    return `<tr${rowClass}><td>${t.type}</td><td>${t.parentName}</td><td>${t.taskList}</td><td>${t.title}</td><td>${t.assignee}</td><td>${t.priority}</td><td><span class="status-badge ${sc}">${t.status}</span></td><td>${t.dueDate}</td><td>${t.month}</td><td>${t.estMinutes||''}</td><td>${t.credits||''}</td></tr>`;
  }).join('');
}

function populateFilters() {
  const statuses = [...new Set(ALL_TASKS.map(t=>t.statusCategory))].sort();
  const assignees = [...new Set(ALL_TASKS.map(t=>t.assignee).filter(Boolean))].sort();
  const priorities = [...new Set(ALL_TASKS.map(t=>t.priority).filter(Boolean))].sort();
  const sf = document.getElementById('statusFilter');
  statuses.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; sf.appendChild(o); });
  const af = document.getElementById('assigneeFilter');
  assignees.forEach(a => { const o = document.createElement('option'); o.value=a; o.textContent=a; af.appendChild(o); });
  const pf = document.getElementById('priorityFilter');
  priorities.forEach(p => { const o = document.createElement('option'); o.value=p; o.textContent=p; pf.appendChild(o); });
}

function setWorkloadMode(mode) {
  workloadMode = mode;
  document.querySelectorAll('.chart-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  refresh();
}

function refresh() {
  const filtered = getFilteredTasks();
  const display = getDisplayTasks(filtered);
  const kpis = computeKPIs(filtered);
  renderKPIs(kpis);
  renderWorkloadChart(filtered);
  renderStatusChart(filtered);
  renderTable(display);
}

populateFilters();
refresh();
</script>

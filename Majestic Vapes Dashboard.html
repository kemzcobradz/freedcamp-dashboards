  .chart-card.narrow { flex: 1; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-size: 16px; font-weight: 600; }

  .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

  .filters select { min-width: 140px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }

  tr:nth-child(even) { background: #162032; }
  tr:hover { background: #1e3a5f; }
  .overdue { color: #ef4444; font-weight: 600; }
  tr.parent-task { background: #2a1520 !important; }

  .filter-toggles { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }

const budget = 30;
const completedStatuses = ['Done', 'Completed'];
const inProgressStatuses = ['Doing', 'In Progress', 'Ready to Start', 'Waiting - Client', 'Waiting - Internal'];
const assignees = ["Asad M.", "Aubrey", "Chris C.", "Farhan A.", "Jann Christopher G.", "Jess Jacinth Kem A.", "Saad S.", "Sheheryar A."];
const statuses = ["Doing", "Don't Start", "Done", "Ready to Start", "Review", "Waiting - Vendor"];
const priorities = ["High", "Low", "None", "Normal"];

// Populate filter dropdowns
const sf = document.getElementById('statusFilter');
statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s || '(empty)'; sf.appendChild(o); });
const af = document.getElementById('assigneeFilter');
assignees.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; af.appendChild(o); });
const pf = document.getElementById('priorityFilter');
priorities.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p || '(empty)'; pf.appendChild(o); });

// Charts (initialized once, updated dynamically)
let showingEst = true;
const workloadCtx = document.getElementById('workloadChart').getContext('2d');
const workloadChart = new Chart(workloadCtx, {
  type: 'bar',
  data: { labels: [], datasets: [{ label: 'Est Minutes', data: [], backgroundColor: '#3b82f6', borderRadius: 4 }] },
  options: {
    indexAxis: 'y', responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
      y: { ticks: { color: '#e2e8f0' }, grid: { display: false } }
    }
  }
});

const statusCtx = document.getElementById('statusChart').getContext('2d');
const statusChart = new Chart(statusCtx, {
  type: 'doughnut',
  data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderWidth: 0 }] },
  options: {
    responsive: true,
    plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', padding: 12 } } }
  }
});

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const assignee = document.getElementById('assigneeFilter').value;
  const priority = document.getElementById('priorityFilter').value;
  const showBacklog = document.getElementById('showBacklog').checked;
  const showPlanned = document.getElementById('showPlanned').checked;
  return allTasks.filter(t => {
    const tl = t.taskList.toLowerCase();
    if (!showBacklog && tl === 'backlog') return false;
    if (!showPlanned && tl === 'planned') return false;
    if (search && !t.name.toLowerCase().includes(search) && !t.taskList.toLowerCase().includes(search)) return false;
    if (status && t.status !== status) return false;
    if (assignee && t.assignedTo !== assignee) return false;
    if (priority && t.priority !== priority) return false;
    return true;
  });
}

function updateKPIs(filtered) {
  const today = new Date().toISOString().split('T')[0];
  const total = filtered.length;
  let completed = 0, totalCredits = 0, totalEstMin = 0;
  filtered.forEach(t => {
    if (completedStatuses.includes(t.status)) completed++;
    if (t.credits) totalCredits += parseFloat(t.credits) || 0;
    if (t.estMinutes) totalEstMin += parseFloat(t.estMinutes) || 0;
  });
  // Overdue: backlog + current (not planned), past due, not completed
  let overdue = 0;
  allTasks.forEach(t => {
    const tl = (t.taskList || '').toLowerCase();
    if (tl === 'planned') return;
    if (t.dueDate && t.dueDate < today && !completedStatuses.includes(t.status)) overdue++;
  });
  const pct = total > 0 ? Math.round(completed / total * 1000) / 10 : 0;
  totalCredits = Math.round(totalCredits * 100) / 100;
  const estHours = Math.round(totalEstMin / 60 * 10) / 10;
  const overage = Math.round((totalCredits - budget) * 100) / 100;
  const ovSign = overage > 0 ? '+' : '';

  document.getElementById('kpiTotal').textContent = total;
  const overdueEl = document.getElementById('kpiOverdue');
  overdueEl.textContent = overdue;
  overdueEl.style.color = overdue > 0 ? '#ef4444' : '#22c55e';
  const ovEl = document.getElementById('kpiOverage');
  ovEl.textContent = ovSign + overage;
  ovEl.style.color = overage > 0 ? '#ef4444' : '#22c55e';
  const compEl = document.getElementById('kpiCompletion');
  compEl.textContent = pct + '%';
  compEl.style.color = pct >= 50 ? '#22c55e' : pct >= 25 ? '#f59e0b' : '#ef4444';
  document.getElementById('kpiCredits').textContent = totalCredits;
  document.getElementById('kpiHours').textContent = estHours + 'h';
}

function updateCharts(filtered) {
  // Team workload
  const tw = {};
  filtered.forEach(t => {
    const a = t.assignedTo || 'Unassigned';
    if (!tw[a]) tw[a] = { estMinutes: 0, credits: 0 };
    if (t.estMinutes) tw[a].estMinutes += parseFloat(t.estMinutes) || 0;
    if (t.credits) tw[a].credits += parseFloat(t.credits) || 0;
  });
  const twLabels = Object.keys(tw);
  const twEst = twLabels.map(k => tw[k].estMinutes);
  const twCred = twLabels.map(k => tw[k].credits);
  workloadChart.data.labels = twLabels;
  workloadChart.data.datasets[0].data = showingEst ? twEst : twCred;
  workloadChart.data.datasets[0].label = showingEst ? 'Est Minutes' : 'Credits';
  workloadChart.data.datasets[0].backgroundColor = showingEst ? '#3b82f6' : '#8b5cf6';
  workloadChart.update();

  // Store for toggle
  window._twEst = twEst;
  window._twCred = twCred;

  // Status distribution
  const sd = { 'Completed': 0, 'In Progress': 0, 'No Progress': 0 };
  filtered.forEach(t => {
    if (completedStatuses.includes(t.status)) sd['Completed']++;
    else if (inProgressStatuses.includes(t.status)) sd['In Progress']++;
    else sd['No Progress']++;
  });
  const sdLabels = Object.keys(sd).filter(k => sd[k] > 0);
  const sdValues = sdLabels.map(k => sd[k]);
  const sdColors = sdLabels.map(k => k === 'Completed' ? '#22c55e' : k === 'In Progress' ? '#3b82f6' : '#64748b');
  statusChart.data.labels = sdLabels;
  statusChart.data.datasets[0].data = sdValues;
  statusChart.data.datasets[0].backgroundColor = sdColors;
  statusChart.update();
}

function renderTable(tasks) {
  const tbody = document.getElementById('taskTableBody');
  const today = new Date().toISOString().split('T')[0];
  tbody.innerHTML = tasks.map(t => {
    const isOverdue = t.dueDate && t.dueDate < today && !completedStatuses.includes(t.status);
    const cls = isOverdue ? ' class="overdue"' : '';
    const rowCls = t.type === 'Task' ? ' class="parent-task"' : '';
    return `<tr${rowCls}><td>${t.type}</td><td>${t.subtaskOf}</td><td>${t.taskList}</td><td${cls}>${t.name}</td><td>${t.assignedTo}</td><td>${t.priority}</td><td>${t.status}</td><td${cls}>${t.dueDate}</td><td>${t.month}</td><td>${t.estMinutes}</td><td>${t.credits}</td></tr>`;
  }).join('');
}

function toggleWorkload() {
  showingEst = !showingEst;
  workloadChart.data.datasets[0].label = showingEst ? 'Est Minutes' : 'Credits';
  workloadChart.data.datasets[0].data = showingEst ? window._twEst : window._twCred;
  workloadChart.data.datasets[0].backgroundColor = showingEst ? '#3b82f6' : '#8b5cf6';
  workloadChart.update();
  document.querySelector('.toggle-btn').textContent = showingEst ? 'Switch to Credits' : 'Switch to Est Minutes';
}

function updateDashboard() {
  const filtered = getFiltered();
  updateKPIs(filtered);
  updateCharts(filtered);
  renderTable(filtered);
}

updateDashboard();

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
.header { text-align: center; margin-bottom: 8px; }

.last-updated { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
.budget-info { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
.back-link { text-align: center; margin-bottom: 20px; }
.back-link a { color: #60a5fa; text-decoration: none; font-size: 14px; }
.back-link a:hover { text-decoration: underline; }
.kpi-row { display: flex; gap: 16px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
.kpi-card { background: #1e293b; border-radius: 12px; padding: 20px 28px; text-align: center; min-width: 160px; }
.kpi-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.kpi-card .value { font-size: 28px; font-weight: 700; color: #f8fafc; }
.toggle-row { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
.toggle-row label { color: #94a3b8; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.toggle-row input { cursor: pointer; }
.charts-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
.chart-container { background: #1e293b; border-radius: 12px; padding: 20px; flex: 1; min-width: 350px; max-width: 550px; }
.chart-container h3 { color: #f8fafc; font-size: 16px; margin-bottom: 4px; }
.chart-toggle { margin-bottom: 10px; }
.chart-toggle label { color: #94a3b8; font-size: 12px; cursor: pointer; margin-right: 12px; }
.filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
.filters input, .filters select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
.filters input { min-width: 220px; }
table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
th { background: #334155; color: #f8fafc; padding: 10px 12px; text-align: left; font-size: 13px; position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid #1a2332; font-size: 13px; }
tr:hover { background: #263348; }
tr.parent-task { background: #2a1520; }
tr.parent-task:hover { background: #3a2030; }
.status-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.status-completed { background: #065f46; color: #6ee7b7; }
.status-inprogress { background: #1e3a5f; color: #60a5fa; }
.status-noprogress { background: #3f3f46; color: #a1a1aa; }
.overage-over { color: #f87171; }
.overage-under { color: #4ade80; }
</style>

const BUDGET = 8;
const STATUS_MAP = {"Done": "Completed", "Completed": "Completed", "Doing": "In Progress", "In Progress": "In Progress", "Ready to Start": "In Progress", "Waiting - Client": "In Progress", "Waiting - Internal": "In Progress", "Don't Start": "No Progress", "No Progress": "No Progress", "Not Started": "No Progress", "": "No Progress"};

let workloadChart = null;
let statusChart = null;

function getFilteredTasks() {
  const showBacklog = document.getElementById('toggleBacklog').checked;
  const showPlanned = document.getElementById('togglePlanned').checked;
  return ALL_TASKS.filter(t => {
    const tl = (t.taskList || '').toLowerCase();
    if (!showBacklog && tl === 'backlog') return false;
    if (!showPlanned && tl === 'planned') return false;
    return true;
  });
}

function safeFloat(v) { try { return parseFloat(v) || 0; } catch { return 0; } }

function computeKPIs(tasks) {
  const total = tasks.length;
  const totalCredits = tasks.reduce((s, t) => s + safeFloat(t.credits), 0);
  const totalEstMin = tasks.reduce((s, t) => s + safeFloat(t.estMinutes), 0);
  const completed = tasks.filter(t => {
    const cat = STATUS_MAP[t.status] || STATUS_MAP[''];
    return cat === 'Completed';
  }).length;
  const completionPct = total > 0 ? Math.round((completed / total) * 100) : 0;
  const overage = totalCredits - BUDGET;
  return { total, totalCredits, totalEstMin, completionPct, overage };
}

function renderKPIs(kpis) {
  const overageClass = kpis.overage > 0 ? 'overage-over' : 'overage-under';
  const overageStr = (kpis.overage >= 0 ? '+' : '') + kpis.overage.toFixed(1);
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card"><div class="label">Total Tasks</div><div class="value">${kpis.total}</div></div>
    <div class="kpi-card"><div class="label">Overage</div><div class="value ${overageClass}">${overageStr}</div></div>
    <div class="kpi-card"><div class="label">Completion</div><div class="value">${kpis.completionPct}%</div></div>
    <div class="kpi-card"><div class="label">Total Credits</div><div class="value">${kpis.totalCredits.toFixed(1)}</div></div>
    <div class="kpi-card"><div class="label">Est. Hours</div><div class="value">${(kpis.totalEstMin / 60).toFixed(1)}</div></div>
  `;
}

function renderCharts(tasks) {
  const metric = document.querySelector('input[name="workloadMetric"]:checked').value;
  
  // Workload by assignee
  const workload = {};
  tasks.forEach(t => {
    const a = t.assignedTo || 'Unassigned';
    if (!workload[a]) workload[a] = 0;
    workload[a] += metric === 'credits' ? safeFloat(t.credits) : safeFloat(t.estMinutes);
  });
  const sortedAssignees = Object.entries(workload).sort((a, b) => b[1] - a[1]);
  
  if (workloadChart) workloadChart.destroy();
  workloadChart = new Chart(document.getElementById('workloadChart'), {
    type: 'bar',
    data: {
      labels: sortedAssignees.map(e => e[0]),
      datasets: [{ label: metric === 'credits' ? 'Credits' : 'Est Minutes', data: sortedAssignees.map(e => e[1]),
        backgroundColor: '#3b82f6', borderRadius: 4 }]
    },
    options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#e2e8f0' }, grid: { display: false } } } }
  });
  
  // Status doughnut
  const statusCounts = { 'Completed': 0, 'In Progress': 0, 'No Progress': 0 };
  tasks.forEach(t => {
    const cat = STATUS_MAP[t.status] || STATUS_MAP[''];
    statusCounts[cat] = (statusCounts[cat] || 0) + 1;
  });
  
  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(statusCounts),
      datasets: [{ data: Object.values(statusCounts),
        backgroundColor: ['#4ade80', '#60a5fa', '#a1a1aa'] }]
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#e2e8f0' } } } }
  });
}

function renderTable(tasks) {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const assigneeF = document.getElementById('assigneeFilter').value;
  const priorityF = document.getElementById('priorityFilter').value;
  
  let filtered = tasks.filter(t => {
    if (search && !(t.name || '').toLowerCase().includes(search) && !(t.assignedTo || '').toLowerCase().includes(search)) return false;
    if (statusF && t.status !== statusF) return false;
    if (assigneeF && t.assignedTo !== assigneeF) return false;
    if (priorityF && t.priority !== priorityF) return false;
    return true;
  });
  
  const tbody = document.getElementById('taskTableBody');
  tbody.innerHTML = filtered.map(t => {
    const cat = STATUS_MAP[t.status] || STATUS_MAP[''];
    const statusClass = cat === 'Completed' ? 'status-completed' : cat === 'In Progress' ? 'status-inprogress' : 'status-noprogress';
    const rowClass = t.type === 'Task' ? 'parent-task' : '';
    return `<tr class="${rowClass}">
      <td>${t.type}</td><td>${t.subtaskOf || ''}</td><td>${t.taskList || ''}</td>
      <td>${t.name || ''}</td><td>${t.assignedTo || ''}</td><td>${t.priority || ''}</td>
      <td><span class="status-badge ${statusClass}">${t.status || 'No Status'}</span></td>
      <td>${t.startDate || ''}</td><td>${t.dueDate || ''}</td><td>${t.dateCompleted || ''}</td>
      <td>${t.month || ''}</td><td>${t.estMinutes || ''}</td><td>${t.credits || ''}</td>
    </tr>`;
  }).join('');
}

function populateFilters() {
  const statuses = [...new Set(ALL_TASKS.map(t => t.status).filter(Boolean))].sort();
  const assignees = [...new Set(ALL_TASKS.map(t => t.assignedTo).filter(Boolean))].sort();
  const priorities = [...new Set(ALL_TASKS.map(t => t.priority).filter(Boolean))].sort();
  
  const sf = document.getElementById('statusFilter');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });
  const af = document.getElementById('assigneeFilter');
  assignees.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; af.appendChild(o); });
  const pf = document.getElementById('priorityFilter');
  priorities.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; pf.appendChild(o); });
}

function recalcAll() {
  const tasks = getFilteredTasks();
  const kpis = computeKPIs(tasks);
  renderKPIs(kpis);
  renderCharts(tasks);
  renderTable(tasks);
}

function filterTable() {
  const tasks = getFilteredTasks();
  renderTable(tasks);
}

populateFilters();
recalcAll();
</script>

<style>

  .kpi-row { display: flex; gap: 16px; margin-bottom: 24px; }

  .chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
  .chart-card.wide { flex: 2; }
  .chart-card.narrow { flex: 1; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-size: 16px; font-weight: 600; }
  .toggle-btn { background: #334155; border: none; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .toggle-btn:hover { background: #475569; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
  th { background: #334155; padding: 12px 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
  td { padding: 12px 16px; border-top: 1px solid #1e293b; font-size: 14px; }
  tr:nth-child(even) { background: #162032; }
  tr:hover { background: #1e3a5f; }

<div class="charts-row">

const budgets = {"PSI Conversion": 7, "Pyzer Criminal Lawyers": 13.5, "Centre Vitalab": 5, "CNL Law": 10, "Kelley Construction": 10, "Majestic Vapes": 30, "Malachi Gillihan": 8, "STM Trucks": 10, "Vista Projects": 8};
const campNames = ["PSI Conversion", "Pyzer Criminal Lawyers", "Centre Vitalab", "CNL Law", "Kelley Construction", "Majestic Vapes", "Malachi Gillihan", "STM Trucks", "Vista Projects"];
const campColors = ["#3b82f6", "#22c55e", "#f59e0b", "#ef4444", "#8b5cf6", "#ec4899", "#14b8a6", "#f97316", "#6366f1"];
const completedStatuses = ['Done', 'Completed'];

let showingEst = true;

function getFilteredByCampaign() {
  const showBacklog = document.getElementById('showBacklog').checked;
  const showPlanned = document.getElementById('showPlanned').checked;
  const result = {};
  for (const cname of campNames) {
    result[cname] = (allTasksByCampaign[cname] || []).filter(t => {
      const tl = (t.taskList || '').toLowerCase();
      if (!showBacklog && tl === 'backlog') return false;
      if (!showPlanned && tl === 'planned') return false;
      return true;
    });
  }
  return result;
}

function updateKPIs(filtered) {
  let totalTasks = 0, totalCompleted = 0, totalCredits = 0, totalEstMin = 0, totalOverage = 0;
  for (const cname of campNames) {
    const tasks = filtered[cname];
    totalTasks += tasks.length;
    totalCompleted += tasks.filter(t => completedStatuses.includes(t.status)).length;
    let campCredits = 0;
    tasks.forEach(t => {
      const cr = parseFloat(t.credits) || 0;
      const em = parseFloat(t.estMinutes) || 0;
      campCredits += cr;
      totalCredits += cr;
      totalEstMin += em;
    });
    totalOverage += campCredits - (budgets[cname] || 0);
  }
  totalOverage = Math.round(totalOverage * 100) / 100;
  totalCredits = Math.round(totalCredits * 100) / 100;
  const totalCompletion = totalTasks > 0 ? Math.round(totalCompleted / totalTasks * 1000) / 10 : 0;
  const totalHours = Math.round(totalEstMin / 60 * 10) / 10;

  document.getElementById('kpiTotal').textContent = totalTasks;
  const ovEl = document.getElementById('kpiOverage');
  ovEl.textContent = (totalOverage > 0 ? '+' : '') + totalOverage;
  ovEl.style.color = totalOverage > 0 ? '#ef4444' : '#22c55e';
  const compEl = document.getElementById('kpiCompletion');
  compEl.textContent = totalCompletion + '%';
  compEl.style.color = totalCompletion >= 50 ? '#22c55e' : totalCompletion >= 25 ? '#f59e0b' : '#ef4444';
  document.getElementById('kpiCredits').textContent = totalCredits;
  document.getElementById('kpiHours').textContent = totalHours + 'h';
}

function updateCharts(filtered) {
  // Team workload aggregate
  const tw = {};
  for (const cname of campNames) {
    filtered[cname].forEach(t => {
      const a = t.assignedTo || 'Unassigned';
      if (!tw[a]) tw[a] = { estMinutes: 0, credits: 0 };
      tw[a].estMinutes += parseFloat(t.estMinutes) || 0;
      tw[a].credits += parseFloat(t.credits) || 0;
    });
  }
  const twLabels = Object.keys(tw);
  window._twEst = twLabels.map(k => tw[k].estMinutes);
  window._twCred = twLabels.map(k => Math.round(tw[k].credits * 100) / 100);

  workloadChart.data.labels = twLabels;
  workloadChart.data.datasets[0].data = showingEst ? window._twEst : window._twCred;
  workloadChart.update();

  // Tasks by campaign
  const campCounts = campNames.map(c => filtered[c].length);
  distChart.data.datasets[0].data = campCounts;
  distChart.update();
}

function updateTable(filtered) {
  let html = '';
  for (const cname of campNames) {
    const tasks = filtered[cname];
    const budget = budgets[cname] || 0;
    const total = tasks.length;
    let credits = 0, completed = 0, estMin = 0;
    tasks.forEach(t => {
      credits += parseFloat(t.credits) || 0;
      estMin += parseFloat(t.estMinutes) || 0;
      if (completedStatuses.includes(t.status)) completed++;
    });
    credits = Math.round(credits * 100) / 100;
    const overage = Math.round((credits - budget) * 100) / 100;
    const ovSign = overage > 0 ? '+' : '';
    const ovColor = overage > 0 ? '#ef4444' : '#22c55e';
    const completion = total > 0 ? Math.round(completed / total * 1000) / 10 : 0;
    const compColor = completion >= 50 ? '#22c55e' : completion >= 25 ? '#f59e0b' : '#ef4444';
    const hours = Math.round(estMin / 60 * 10) / 10;
    html += '<tr>';
    html += '<td><a href="' + cname + ' Dashboard.html" style="color:#60a5fa;text-decoration:none">' + cname + '</a></td>';
    html += '<td>' + total + '</td>';
    html += '<td>' + budget + '</td>';
    html += '<td>' + credits + '</td>';
    html += '<td style="color:' + ovColor + ';font-weight:600">' + ovSign + overage + '</td>';
    html += '<td style="color:' + compColor + '">' + completion + '%</td>';
    html += '<td>' + hours + 'h</td>';
    html += '</tr>';
  }
  document.getElementById('campTableBody').innerHTML = html;
}

function updateDashboard() {
  const filtered = getFilteredByCampaign();
  updateKPIs(filtered);
  updateCharts(filtered);
  updateTable(filtered);
}

  options: {
    responsive: true,
    plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', padding: 8, font: { size: 11 } } } }
  }
});

function toggleWorkload() {
  showingEst = !showingEst;
  workloadChart.data.datasets[0].label = showingEst ? 'Est Minutes' : 'Credits';
  workloadChart.data.datasets[0].data = showingEst ? window._twEst : window._twCred;
  workloadChart.data.datasets[0].backgroundColor = showingEst ? '#3b82f6' : '#8b5cf6';
  workloadChart.update();
  document.querySelector('.toggle-btn').textContent = showingEst ? 'Switch to Credits' : 'Switch to Est Minutes';
}

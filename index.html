.chart-toggle { text-align:center; margin-bottom:8px; }

table { width:100%; border-collapse:collapse; font-size:0.85rem; margin-top:16px; }
thead th { background:#1e293b; padding:10px 8px; text-align:left; color:#94a3b8; font-weight:600; text-transform:uppercase; font-size:0.7rem; letter-spacing:0.5px; cursor:pointer; }
tbody tr { border-bottom:1px solid #1e293b; }
tbody tr:hover { background:#1e293b; }
tbody td { padding:10px 8px; }
tbody td a { color:#60a5fa; text-decoration:none; }
tbody td a:hover { text-decoration:underline; }
.overage-pos { color:#ef4444; font-weight:600; }
.overage-neg { color:#22c55e; font-weight:600; }
.overdue-red { color:#ef4444; font-weight:600; }
.overdue-green { color:#22c55e; font-weight:600; }

const TODAY = '2026-03-16';
let workloadMode = 'minutes';
let workloadChart, distChart;

function isBacklog(t) { return t.taskList && t.taskList.toLowerCase().includes('backlog'); }
function isPlanned(t) { return t.taskList && t.taskList.toLowerCase().includes('planned'); }

function filterTasks(tasks) {
  const showBacklog = document.getElementById('toggleBacklog').checked;
  const showPlanned = document.getElementById('togglePlanned').checked;
  return tasks.filter(t => {
    if (!showBacklog && isBacklog(t)) return false;
    if (!showPlanned && isPlanned(t)) return false;
    return true;
  });
}

function computeOverdue(tasks) {
  // Fixed metric: Backlog + Current (NOT Planned), overdue and not completed
  return tasks.filter(t => {
    if (isPlanned(t)) return false;
    if (t.statusCategory === 'Completed') return false;
    if (!t.dueDate) return false;
    return t.dueDate < TODAY;
  }).length;
}

function refresh() {
  let totalTasks = 0, totalOveragePos = 0, totalCompleted = 0, totalAll = 0, totalCredits = 0, totalMinutes = 0;
  const rows = [];
  const assignees = {};
  const distLabels = [], distData = [];

  CAMPAIGNS.forEach(c => {
    const filtered = filterTasks(c.tasks);
    const total = filtered.length;
    const completed = filtered.filter(t => t.statusCategory === 'Completed').length;
    const credits = filtered.reduce((s,t) => s + t.credits, 0);
    const overage = credits - c.budget;
    const overdue = computeOverdue(c.tasks); // Always from all non-Planned
    const pct = total > 0 ? Math.round((completed/total)*100) : 0;

    totalTasks += total;
    totalCompleted += completed;
    totalAll += total;
    totalCredits += credits;
    totalMinutes += filtered.reduce((s,t) => s + t.estMinutes, 0);
    if (overage > 0) totalOveragePos += overage;

    distLabels.push(c.name);
    distData.push(total);

    filtered.forEach(t => {
      if (!t.assignee) return;
      if (!assignees[t.assignee]) assignees[t.assignee] = { minutes:0, credits:0 };
      assignees[t.assignee].minutes += t.estMinutes;
      assignees[t.assignee].credits += t.credits;
    });

    const ovStr = overage >= 0 ? '+' + overage.toFixed(1) : overage.toFixed(1);
    const ovClass = overage > 0 ? 'overage-pos' : 'overage-neg';
    const odClass = overdue > 0 ? 'overdue-red' : 'overdue-green';
    rows.push(`<tr><td><a href="${c.name} Dashboard.html">${c.name}</a></td><td>${c.budget}</td><td>${credits.toFixed(1)}</td><td class="${ovClass}">${ovStr}</td><td class="${odClass}">${overdue}</td><td>${total}</td><td>${pct}%</td></tr>`);
  });

  // KPIs
  const totalPct = totalAll > 0 ? Math.round((totalCompleted/totalAll)*100) : 0;
  const totalHours = (totalMinutes/60).toFixed(1);
  const ovClass = totalOveragePos > 0 ? 'red' : 'green';
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi"><div class="kpi-value">${totalTasks}</div><div class="kpi-label">Total Tasks</div></div>
    <div class="kpi"><div class="kpi-value ${ovClass}">+${totalOveragePos.toFixed(1)}</div><div class="kpi-label">Total Overage</div></div>
    <div class="kpi"><div class="kpi-value">${totalPct}%</div><div class="kpi-label">Completion</div></div>
    <div class="kpi"><div class="kpi-value">${totalCredits.toFixed(1)}</div><div class="kpi-label">Total Credits</div></div>
    <div class="kpi"><div class="kpi-value">${totalHours}</div><div class="kpi-label">Est. Hours</div></div>
  `;

  // Campaign table
  document.getElementById('campaignBody').innerHTML = rows.join('');

  // Workload chart
  const aLabels = Object.keys(assignees).sort();
  const aValues = aLabels.map(a => workloadMode === 'minutes' ? assignees[a].minutes : assignees[a].credits);
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#f97316','#84cc16','#e11d48','#6366f1','#a855f7','#14b8a6'];
  if (workloadChart) workloadChart.destroy();
  workloadChart = new Chart(document.getElementById('workloadChart'), {
    type:'bar',
    data:{ labels:aLabels, datasets:[{ data:aValues, backgroundColor:aLabels.map((_,i)=>colors[i%colors.length]), borderRadius:4 }] },
    options:{ indexAxis:'y', responsive:true, plugins:{ legend:{ display:false } },
      scales:{ x:{ ticks:{ color:'#94a3b8' }, grid:{ color:'#1e293b' } }, y:{ ticks:{ color:'#e2e8f0', font:{ size:11 } }, grid:{ display:false } } } }
  });

  // Distribution chart
  if (distChart) distChart.destroy();
  distChart = new Chart(document.getElementById('distChart'), {
    type:'doughnut',
    data:{ labels:distLabels, datasets:[{ data:distData, backgroundColor:colors.slice(0, distLabels.length) }] },
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#e2e8f0', font:{ size:11 } } } } }
  });
}

function setWorkloadMode(mode) {
  workloadMode = mode;
  document.querySelectorAll('.chart-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  refresh();
}

refresh();
</script>

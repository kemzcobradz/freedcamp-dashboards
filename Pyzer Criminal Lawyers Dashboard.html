  .kpi-value { font-size: 32px; font-weight: 700; }
  .kpi-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  .charts-row { display: flex; gap: 16px; margin-bottom: 24px; }
  .chart-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
  .chart-card.wide { flex: 2; }
  .chart-card.narrow { flex: 1; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .chart-title { font-size: 16px; font-weight: 600; }
  .toggle-btn { background: #334155; border: none; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .toggle-btn:hover { background: #475569; }
  .filters { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .filters input, .filters select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
  .filters input { flex: 1; min-width: 200px; }
  .filters select { min-width: 140px; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
  th { background: #334155; padding: 10px 12px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
  td { padding: 10px 12px; border-top: 1px solid #1e293b; font-size: 13px; }
  tr:nth-child(even) { background: #162032; }
  tr:hover { background: #1e3a5f; }
  .overdue { color: #ef4444; font-weight: 600; }
  tr.parent-task { background: #2a1520 !important; }
  tr.parent-task:hover { background: #3a1a2a !important; }
  .filter-toggles { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
  .filter-toggles label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #94a3b8; cursor: pointer; }

  const pct = total > 0 ? Math.round(completed / total * 1000) / 10 : 0;
  totalCredits = Math.round(totalCredits * 100) / 100;
  const estHours = Math.round(totalEstMin / 60 * 10) / 10;
  const overage = Math.round((totalCredits - budget) * 100) / 100;
  const ovSign = overage > 0 ? '+' : '';

  document.getElementById('kpiTotal').textContent = total;
  const ovEl = document.getElementById('kpiOverage');
  ovEl.textContent = ovSign + overage;
  ovEl.style.color = overage > 0 ? '#ef4444' : '#22c55e';
  const compEl = document.getElementById('kpiCompletion');
  compEl.textContent = pct + '%';
  compEl.style.color = pct >= 50 ? '#22c55e' : pct >= 25 ? '#f59e0b' : '#ef4444';
  document.getElementById('kpiCredits').textContent = totalCredits;
  document.getElementById('kpiHours').textContent = estHours + 'h';
}

function updateCharts(filtered) {
  // Team workload
  const tw = {};
  filtered.forEach(t => {
    const a = t.assignedTo || 'Unassigned';
    if (!tw[a]) tw[a] = { estMinutes: 0, credits: 0 };
    if (t.estMinutes) tw[a].estMinutes += parseFloat(t.estMinutes) || 0;
    if (t.credits) tw[a].credits += parseFloat(t.credits) || 0;
  });
  const twLabels = Object.keys(tw);
  const twEst = twLabels.map(k => tw[k].estMinutes);
  const twCred = twLabels.map(k => tw[k].credits);
  workloadChart.data.labels = twLabels;
  workloadChart.data.datasets[0].data = showingEst ? twEst : twCred;
  workloadChart.data.datasets[0].label = showingEst ? 'Est Minutes' : 'Credits';
  workloadChart.data.datasets[0].backgroundColor = showingEst ? '#3b82f6' : '#8b5cf6';
  workloadChart.update();

  // Store for toggle
  window._twEst = twEst;
  window._twCred = twCred;

  // Status distribution
  const sd = { 'Completed': 0, 'In Progress': 0, 'No Progress': 0 };
  filtered.forEach(t => {
    if (completedStatuses.includes(t.status)) sd['Completed']++;
    else if (inProgressStatuses.includes(t.status)) sd['In Progress']++;
    else sd['No Progress']++;
  });
  const sdLabels = Object.keys(sd).filter(k => sd[k] > 0);
  const sdValues = sdLabels.map(k => sd[k]);
  const sdColors = sdLabels.map(k => k === 'Completed' ? '#22c55e' : k === 'In Progress' ? '#3b82f6' : '#64748b');
  statusChart.data.labels = sdLabels;
  statusChart.data.datasets[0].data = sdValues;
  statusChart.data.datasets[0].backgroundColor = sdColors;
  statusChart.update();
}

function renderTable(tasks) {
  const tbody = document.getElementById('taskTableBody');
  const today = new Date().toISOString().split('T')[0];
  tbody.innerHTML = tasks.map(t => {
    const isOverdue = t.dueDate && t.dueDate < today && !completedStatuses.includes(t.status);
    const cls = isOverdue ? ' class="overdue"' : '';
    const rowCls = t.type === 'Task' ? ' class="parent-task"' : '';
    return `<tr${rowCls}><td>${t.type}</td><td>${t.subtaskOf}</td><td>${t.taskList}</td><td${cls}>${t.name}</td><td>${t.assignedTo}</td><td>${t.priority}</td><td>${t.status}</td><td${cls}>${t.dueDate}</td><td>${t.month}</td><td>${t.estMinutes}</td><td>${t.credits}</td></tr>`;
  }).join('');
}

function toggleWorkload() {
  showingEst = !showingEst;
  workloadChart.data.datasets[0].label = showingEst ? 'Est Minutes' : 'Credits';
  workloadChart.data.datasets[0].data = showingEst ? window._twEst : window._twCred;
  workloadChart.data.datasets[0].backgroundColor = showingEst ? '#3b82f6' : '#8b5cf6';
  workloadChart.update();
  document.querySelector('.toggle-btn').textContent = showingEst ? 'Switch to Credits' : 'Switch to Est Minutes';
}

function updateDashboard() {
  const filtered = getFiltered();
  updateKPIs(filtered);
  updateCharts(filtered);
  renderTable(filtered);
}

updateDashboard();
</script>

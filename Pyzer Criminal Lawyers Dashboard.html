<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
.header { text-align: center; margin-bottom: 20px; }
.header h1 { font-size: 1.8rem; color: #f8fafc; }
.header .subtitle { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }
.back-link { display: inline-block; margin-bottom: 15px; color: #60a5fa; text-decoration: none; font-size: 0.9rem; }
.back-link:hover { text-decoration: underline; }
.kpi-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
.kpi-card { background: #1e293b; border-radius: 10px; padding: 16px 24px; text-align: center; min-width: 130px; flex: 1; max-width: 180px; }
.kpi-value { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
.kpi-label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.budget-note { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 16px; }
.toggle-row { display: flex; gap: 20px; justify-content: center; margin-bottom: 16px; }
.toggle-row label { color: #94a3b8; font-size: 0.85rem; cursor: pointer; }
.toggle-row input { margin-right: 4px; }
.charts-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.chart-container { background: #1e293b; border-radius: 10px; padding: 16px; flex: 1; min-width: 300px; position: relative; }
.chart-container h3 { color: #f8fafc; font-size: 0.95rem; margin-bottom: 10px; }
.chart-toggle { position: absolute; top: 12px; right: 12px; }
.chart-toggle button { background: #334155; color: #94a3b8; border: none; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; margin-left: 4px; }
.chart-toggle button.active { background: #3b82f6; color: white; }
.filters { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.filters input, .filters select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; }
.filters input { flex: 1; min-width: 200px; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
thead th { background: #1e293b; color: #94a3b8; padding: 10px 8px; text-align: left; position: sticky; top: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
tbody tr { border-bottom: 1px solid #1e293b; }
tbody tr:hover { background: #1e293b; }
tbody tr.parent-task { background: #2a1520; }
tbody td { padding: 8px; }
.status-badge { padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
.status-done { background: #065f46; color: #6ee7b7; }
.status-doing { background: #1e3a5f; color: #60a5fa; }
.status-waiting { background: #713f12; color: #fbbf24; }
.status-nostart { background: #334155; color: #94a3b8; }
.red { color: #f87171; }
.green { color: #4ade80; }
</style>
</head>

function getFiltered() {
  const showBacklog = document.getElementById('toggleBacklog').checked;
  const showPlanned = document.getElementById('togglePlanned').checked;
  const search = document.getElementById('searchBox').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const assigneeF = document.getElementById('assigneeFilter').value;
  const priorityF = document.getElementById('priorityFilter').value;

  return allTasks.filter(t => {
    const tl = (t.taskList || '').toLowerCase();
    if (!showBacklog && tl === 'backlog') return false;
    if (!showPlanned && tl === 'planned') return false;
    if (search && !t.name.toLowerCase().includes(search) && !(t.assignedTo||'').toLowerCase().includes(search)) return false;
    if (statusF && t.status !== statusF) return false;
    if (assigneeF && (t.assignedTo||'') !== assigneeF) return false;
    if (priorityF && t.priority !== priorityF) return false;
    return true;
  });
}

function updateKPIs(filtered) {
  const today = new Date().toISOString().split('T')[0];
  const total = filtered.length;
  let completed = 0, totalCredits = 0, totalEstMin = 0;
  filtered.forEach(t => {
    if (completedStatuses.includes(t.status)) completed++;
    if (t.credits) totalCredits += parseFloat(t.credits) || 0;
    if (t.estMinutes) totalEstMin += parseFloat(t.estMinutes) || 0;
  });

  // Overdue: backlog + current (not planned), past due, not completed - ALWAYS from allTasks
  let overdue = 0;
  allTasks.forEach(t => {
    const tl = (t.taskList || '').toLowerCase();
    if (tl === 'planned') return;
    if (t.dueDate && t.dueDate < today && !completedStatuses.includes(t.status)) overdue++;
  });

  const overage = totalCredits - budget;
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

  document.getElementById('kpiTotal').textContent = total;
  const overdueEl = document.getElementById('kpiOverdue');
  overdueEl.textContent = overdue;
  overdueEl.className = 'kpi-value ' + (overdue > 0 ? 'red' : 'green');
  const overageEl = document.getElementById('kpiOverage');
  overageEl.textContent = (overage >= 0 ? '+' : '') + overage.toFixed(1);
  overageEl.className = 'kpi-value ' + (overage > 0 ? 'red' : 'green');
  document.getElementById('kpiCompletion').textContent = pct + '%';
  document.getElementById('kpiCredits').textContent = totalCredits.toFixed(1);
  document.getElementById('kpiHours').textContent = (totalEstMin / 60).toFixed(1);
}

function updateCharts(filtered) {
  // Workload by assignee
  const workloadMap = {};
  filtered.forEach(t => {
    const who = t.assignedTo || 'Unassigned';
    if (!workloadMap[who]) workloadMap[who] = 0;
    const val = workloadMode === 'estMinutes' ? (parseFloat(t.estMinutes) || 0) : (parseFloat(t.credits) || 0);
    workloadMap[who] += val;
  });
  const wLabels = Object.keys(workloadMap).sort((a,b) => workloadMap[b] - workloadMap[a]);
  const wData = wLabels.map(l => workloadMap[l]);

  if (workloadChart) workloadChart.destroy();
  workloadChart = new Chart(document.getElementById('workloadChart'), {
    type: 'bar',
    data: {
      labels: wLabels,
      datasets: [{ data: wData, backgroundColor: '#3b82f6', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#e2e8f0', font: { size: 11 } }, grid: { display: false } }
      }
    }
  });

  // Status doughnut
  const statusMap = {};
  filtered.forEach(t => {
    const s = t.status || 'Not Started';
    statusMap[s] = (statusMap[s] || 0) + 1;
  });
  const sLabels = Object.keys(statusMap);
  const sData = sLabels.map(l => statusMap[l]);
  const colors = sLabels.map(s => {
    if (completedStatuses.includes(s)) return '#4ade80';
    if (['Doing','In Progress','Ready to Start'].includes(s)) return '#3b82f6';
    if (s.includes('Waiting')) return '#fbbf24';
    return '#64748b';
  });

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: sLabels,
      datasets: [{ data: sData, backgroundColor: colors }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right', labels: { color: '#e2e8f0', font: { size: 11 } } }
      }
    }
  });
}

function updateTable(filtered) {
  const tbody = document.getElementById('taskBody');
  let html = '';
  filtered.forEach(t => {
    const isParent = t.type === 'Task';
    const rowClass = isParent ? 'parent-task' : '';
    let statusClass = 'status-nostart';
    if (completedStatuses.includes(t.status)) statusClass = 'status-done';
    else if (['Doing','In Progress','Ready to Start'].includes(t.status)) statusClass = 'status-doing';
    else if ((t.status||'').includes('Waiting')) statusClass = 'status-waiting';

    html += `<tr class="${rowClass}">
      <td>${t.type}</td><td>${t.taskList}</td><td>${t.name}</td>
      <td>${t.assignedTo || '<span style="color:#64748b">Unassigned</span>'}</td>
      <td>${t.priority}</td>
      <td><span class="status-badge ${statusClass}">${t.status || 'Not Started'}</span></td>
      <td>${t.dueDate}</td><td>${t.month}</td>
      <td>${t.estMinutes}</td><td>${t.credits}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function setWorkloadMode(mode) {
  workloadMode = mode;
  document.getElementById('btnEstMin').className = mode === 'estMinutes' ? 'active' : '';
  document.getElementById('btnCredits').className = mode === 'credits' ? 'active' : '';
  refresh();
}

function populateFilters() {
  const statuses = [...new Set(allTasks.map(t => t.status).filter(Boolean))].sort();
  const assignees = [...new Set(allTasks.map(t => t.assignedTo).filter(Boolean))].sort();
  const priorities = [...new Set(allTasks.map(t => t.priority).filter(Boolean))].sort();
  const sf = document.getElementById('statusFilter');
  statuses.forEach(s => { const o = document.createElement('option'); o.value = s; o.text = s; sf.add(o); });
  const af = document.getElementById('assigneeFilter');
  assignees.forEach(a => { const o = document.createElement('option'); o.value = a; o.text = a; af.add(o); });
  const pf = document.getElementById('priorityFilter');
  priorities.forEach(p => { const o = document.createElement('option'); o.value = p; o.text = p; pf.add(o); });
}

function refresh() {
  const filtered = getFiltered();
  updateKPIs(filtered);
  updateCharts(filtered);
  updateTable(filtered);
}

populateFilters();
refresh();
</script>
</body>
</html>

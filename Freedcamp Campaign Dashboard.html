.chart-container h3 { color: #f1f5f9; font-size: 15px; margin-bottom: 12px; }
.chart-toggle { display: flex; gap: 10px; margin-bottom: 10px; }
.chart-toggle button { background: #334155; color: #94a3b8; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.chart-toggle button.active { background: #3b82f6; color: white; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #1e293b; color: #94a3b8; padding: 12px 8px; text-align: left; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; cursor: pointer; }
tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.15s; }
tbody tr:hover { background: #1e293b; }
tbody td { padding: 10px 8px; color: #cbd5e1; }
tbody td a { color: #38bdf8; text-decoration: none; }
tbody td a:hover { text-decoration: underline; }
.table-wrapper { overflow-x: auto; border-radius: 12px; }

const TODAY = "2026-03-16";
const BUDGETS = {"Malachi Gillihan": 8, "CNL Law": 10, "Kelley Construction": 10, "Pyzer Criminal Lawyers": 13.5, "Majestic Vapes": 30, "STM Trucks": 10, "PSI Conversion": 7, "Vista Projects": 8, "Centre Vitalab": 5};

let workloadMode = 'minutes';
let workloadChart, distChart;

function isBacklog(t) { return t.taskList.toLowerCase().includes('backlog'); }
function isPlanned(t) { return t.taskList.toLowerCase().includes('planned'); }

function getFilteredTasksFor(campaignName) {
  const showBacklog = document.getElementById('toggle-backlog').checked;
  const showPlanned = document.getElementById('toggle-planned').checked;
  const tasks = CAMPAIGN_TASKS[campaignName] || [];
  return tasks.filter(t => {
    if (isBacklog(t) && !showBacklog) return false;
    if (isPlanned(t) && !showPlanned) return false;
    return true;
  });
}

// Overdue always counts Backlog + Current (not Planned), regardless of toggle
function getOverdueFor(campaignName) {
  const tasks = CAMPAIGN_TASKS[campaignName] || [];
  return tasks.filter(t => {
    if (isPlanned(t)) return false;
    if (t.statusCat === 'Completed') return false;
    if (!t.dueDate) return false;
    return t.dueDate < TODAY;
  }).length;
}

function refresh() {
  let totalTasks = 0, totalCompleted = 0, totalCredits = 0, totalMinutes = 0, totalOverage = 0;
  const rows = [];
  const campaignNames = CAMPAIGNS.map(c => c.name);

  campaignNames.forEach(name => {
    const tasks = getFilteredTasksFor(name);
    const budget = BUDGETS[name] || 0;
    const total = tasks.length;
    const completed = tasks.filter(t => t.statusCat === 'Completed').length;
    const credits = tasks.reduce((s, t) => s + t.credits, 0);
    const minutes = tasks.reduce((s, t) => s + t.estMinutes, 0);
    const overage = credits - budget;
    const overdue = getOverdueFor(name);
    const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

    totalTasks += total;
    totalCompleted += completed;
    totalCredits += credits;
    totalMinutes += minutes;
    if (overage > 0) totalOverage += overage; // Only sum POSITIVE overages

    const overageColor = overage > 0 ? 'color:#f87171' : 'color:#4ade80';
    const overdueColor = overdue > 0 ? 'color:#f87171' : 'color:#4ade80';

    rows.push(`<tr>
      <td><a href="${encodeURIComponent(name)} Dashboard.html">${name}</a></td>
      <td>${budget}</td><td>${total}</td><td>${completed}</td>
      <td>${pct}%</td><td>${credits.toFixed(1)}</td>
      <td style="${overageColor}">${overage >= 0 ? '+' : ''}${overage.toFixed(1)}</td>
      <td style="${overdueColor}">${overdue}</td>
      <td>${(minutes / 60).toFixed(1)}</td>
    </tr>`);
  });

  document.getElementById('campaign-tbody').innerHTML = rows.join('');

  document.getElementById('kpi-total').textContent = totalTasks;

  const overageEl = document.getElementById('kpi-overage');
  overageEl.textContent = '+' + totalOverage.toFixed(1);
  overageEl.className = 'value ' + (totalOverage > 0 ? 'red' : 'green');

  const pct = totalTasks > 0 ? Math.round((totalCompleted / totalTasks) * 100) : 0;
  document.getElementById('kpi-completion').textContent = pct + '%';
  document.getElementById('kpi-credits').textContent = totalCredits.toFixed(1);
  document.getElementById('kpi-hours').textContent = (totalMinutes / 60).toFixed(1);

  updateCharts();
}

function updateCharts() {
  // Workload chart - aggregate across all campaigns
  const assigneeMap = {};
  const campaignNames = CAMPAIGNS.map(c => c.name);
  campaignNames.forEach(name => {
    const tasks = getFilteredTasksFor(name);
    tasks.forEach(t => {
      if (!t.assignee) return;
      if (!assigneeMap[t.assignee]) assigneeMap[t.assignee] = {minutes: 0, credits: 0};
      assigneeMap[t.assignee].minutes += t.estMinutes;
      assigneeMap[t.assignee].credits += t.credits;
    });
  });

  const assignees = Object.keys(assigneeMap).sort();
  const wData = assignees.map(a => workloadMode === 'minutes' ? assigneeMap[a].minutes : assigneeMap[a].credits);

  if (workloadChart) workloadChart.destroy();
  workloadChart = new Chart(document.getElementById('workloadChart'), {
    type: 'bar',
    data: {
      labels: assignees,
      datasets: [{ label: workloadMode === 'minutes' ? 'Est Minutes' : 'Credits', data: wData, backgroundColor: '#3b82f6', borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
        y: { grid: { display: false }, ticks: { color: '#e2e8f0', font: { size: 11 } } }
      }
    }
  });

  // Distribution chart
  const campaignCounts = campaignNames.map(name => getFilteredTasksFor(name).length);
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f97316','#eab308','#22c55e','#06b6d4','#f43f5e','#a855f7'];

  if (distChart) distChart.destroy();
  distChart = new Chart(document.getElementById('distChart'), {
    type: 'doughnut',
    data: {
      labels: campaignNames,
      datasets: [{ data: campaignCounts, backgroundColor: colors }]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', padding: 8, font: { size: 11 } } } }
    }
  });
}

function setWorkloadMode(mode) {
  workloadMode = mode;
  document.querySelectorAll('.chart-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateCharts();
}

document.getElementById('toggle-backlog').addEventListener('change', refresh);
document.getElementById('toggle-planned').addEventListener('change', refresh);

refresh();
</script>
